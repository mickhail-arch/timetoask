services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: wrapper
      POSTGRES_PASSWORD: wrapper_password
      POSTGRES_DB: wrapper
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wrapper"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
